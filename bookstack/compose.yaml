services:
  bookstack:
    image: ${BOOKSTACK_IMAGE:-solidnerd/bookstack:latest}
    restart: ${BOOKSTACK_RESTART:-unless-stopped}
    volumes:
      - ${VOL_PATH:-/data}/bookstack/uploads:/var/www/bookstack/storage/uploads
      - ${VOL_PATH:-/data}/bookstack/public:/var/www/bookstack/public/uploads
    environment:
      - APP_KEY=${BOOKSTACK_APP_KEY:-ChangeThisPassword}
      - APP_TIMEZONE=${BOOKSTACK_APP_TIMEZONE:-America/Vancouver}
      - APP_URL=${BOOKSTACK_APP_URL:-http://localhost:8080}
      - DB_DATABASE=${BOOKSTACK_DB_DATABASE:-bookstack}
      - DB_HOST=mariadb:3306
      - DB_PASSWORD=${BOOKSTACK_DB_PASSWORD:-ChangeThisPassword}
      - DB_USERNAME=${BOOKSTACK_DB_USERNAME:-dbuser}
      - REVISION_LIMIT=${BOOKSTACK_REVISION_LIMIT:-false}
    ports:
      - ${BOOKSTACK_PORT:-8080}:8080
    networks:
      - proxy
      - internal
    depends_on:
      - mariadb

  mariadb:
    image: ${MARIADB_IMAGE:-mariadb:latest}
    restart: ${MARIADB_RESTART:-unless-stopped}
    volumes:
      - ${VOL_PATH:-/data}/bookstack/db:/var/lib/mysql
    environment:
      - MARIADB_DATABASE=${BOOKSTACK_DB_DATABASE:-bookstack}
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD:-ChangeThisPassword}
      - MARIADB_USER=${BOOKSTACK_DB_USERNAME:-dbuser}
      - MARIADB_PASSWORD=${BOOKSTACK_DB_PASSWORD:-ChangeThisPassword}
    networks:
      - internal
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW --innodb-file-per-table=1 --skip-innodb-read-only-compressed

networks:
  proxy:
    external: true
  internal:
