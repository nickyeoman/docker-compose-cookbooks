# nixai_dev Docker Compose

services:
  nixai:
    image: ${NIXAI_IMAGE:-git.4lt.ca/yourname/nixai:v0.0.1}
    restart: ${NIXAI_RESTART:-unless-stopped}

    volumes:
      - ${VOL_PATH:-/data}/nixai/ollama:/data/ollama
      - ${VOL_PATH:-/data}/nixai/opencode/config:/config
      - ${VOL_PATH:-/data}/nixai/opencode/data:/data
      - ${VOL_PATH:-/data}/nixai/opencode/projects:/projects
      - ${VOL_PATH:-/data}/nixai/openclaw/config:/home/node/.openclaw
      - ${VOL_PATH:-/data}/nixai/openclaw/workspace:/home/node/.openclaw/workspace
      - ${VOL_PATH:-/data}/nixai/openclaw/auth-secrets:/home/node/.config/openclaw
      - ${VOL_PATH:-/data}/nixai/vscode/data:/data/vscode/data
      - ${VOL_PATH:-/data}/nixai/vscode/config:/data/vscode/config

    environment:
      - TZ=${TZ:-America/Vancouver}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - VSCODE_PASSWORD=${VSCODE_PASSWORD}

    ports:
      - "11434:11434"
      - "4096:4096"
      - "18789:18789"
      - "8443:8443"

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    networks:
      - proxy

networks:
  proxy:
    external: true